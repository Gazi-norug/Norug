<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>NoRug | Håndlaget Tufting</title>
    <style>
        body, html { margin: 0; height: 100%; font-family: 'Helvetica Neue', sans-serif; }
        
        .hero-bg {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* Burada görselini çağırıyoruz */
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('atolye.jpg');
            background-size: cover;
            background-position: center;
            color: white;
            text-align: center;
        }

        .logo { width: 300px; margin-bottom: 20px; }
        h1 { font-size: 2.5em; font-weight: 300; margin-bottom: 10px; }
        p { font-size: 1.2em; color: #f1f1f1; }
    </style>
</head>
<body>
    <div class="hero-bg">
        <img src="logo.png" alt="NoRug Logo" class="logo">
        <h1>Håndlaget tufting i Horten</h1>
        <p>Nettsiden vår er under konstruksjon. Vi gleder oss til å vise frem våre unike tepper.</p>
    </div>
</body>
</html>
