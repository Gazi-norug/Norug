<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>NORUG | Premium Håndlagde Tepper</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* OVERUG.CO STİLİ: MİNİMALİST, MODERN VE LÜKS TASARIM AYARLARI */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            scroll-behavior: smooth;
        }
        body {
            background-color: #ffffff;
            color: #111111;
            line-height: 1.6;
        }
        .container {
            width: 90%;
            max-width: 1250px;
            margin: 0 auto;
        }
        a {
            color: inherit;
            text-decoration: none;
        }

        /* PREMIUM HEADER */
        header {
            background-color: #ffffff;
            padding: 20px 0;
            border-bottom: 1px solid #e5e5e5;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo-area img {
            height: 40px; /* DÜZENLENEBİLİR ALAN: Logo yüksekliği */
            width: auto;
            display: block;
        }
        nav {
            display: flex;
            align-items: center;
            gap: 25px;
        }
        nav a {
            font-weight: 500;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
            transition: opacity 0.3s;
        }
        nav a:hover {
            opacity: 0.6;
        }
        
        /* 4. MADDE: SAĞ ÜST İKONLAR (ARAMA, FAVORİ, SEPET) */
        .header-utilities {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .search-container {
            position: relative;
            display: flex;
            align-items: center;
        }
        .search-input {
            padding: 6px 12px 6px 30px;
            border: 1px solid #e5e5e5;
            border-radius: 20px;
            font-size: 0.85rem;
            outline: none;
            width: 180px;
            transition: all 0.3s;
        }
        .search-input:focus {
            border-color: #111;
            width: 220px;
        }
        .search-container i {
            position: absolute;
            left: 10px;
            color: #999;
            font-size: 0.85rem;
        }
        .utility-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
            position: relative;
            transition: transform 0.2s;
        }
        .utility-btn:hover {
            transform: scale(1.1);
        }
        .badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background-color: #111111;
            color: white;
            font-size: 0.65rem;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        /* HERO GİRİŞ ALANI */
        .hero {
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), url('https://images.unsplash.com/photo-1600121848594-d8644e57abab?q=80&w=1200') center/cover no-repeat;
            padding: 80px 0;
            text-align: center;
            color: white;
        }
        .hero h1 {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: 4px;
            margin-bottom: 10px;
        }
        .hero p {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 300;
        }

        /* HAKKIMIZDA (OM OSS) */
        .about-section {
            padding: 60px 0;
            text-align: center;
            background-color: #fbfbfb;
            border-bottom: 1px solid #e5e5e5;
        }
        .about-section h2 {
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }
        .about-content {
            max-width: 800px;
            margin: 0 auto;
            color: #555;
            font-size: 0.95rem;
        }

        /* 1 & 2. MADDE: ÜRÜNLER & KATEGORİLER (Baskı halı yok) */
        .main-content {
            padding: 60px 0;
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            border-bottom: 1px solid #e5e5e5;
            padding-bottom: 15px;
        }
        .section-header h2 {
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .category-tabs {
            display: flex;
            gap: 15px;
        }
        .tab-btn {
            background: none;
            border: 1px solid #e5e5e5;
            padding: 8px 18px;
            font-weight: 500;
            font-size: 0.8rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s;
        }
        .tab-btn.active, .tab-btn:hover {
            background-color: #111111;
            color: #ffffff;
            border-color: #111111;
        }

        /* ÜRÜN KARTLARI GRİD YAPISI (OVERUG TARZI) */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 40px;
        }
        .product-card {
            background: #ffffff;
            position: relative;
            cursor: pointer;
        }
        .product-image-wrapper {
            position: relative;
            overflow: hidden;
            background-color: #f5f5f5;
        }
        .product-image {
            height: 350px;
            background-size: cover;
            background-position: center;
            transition: transform 0.5s ease;
        }
        .product-card:hover .product-image {
            transform: scale(1.04);
        }
        /* Favori Kalp İkonu (Kart Üstünde) */
        .favorite-heart-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: white;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            z-index: 5;
            transition: all 0.2s;
        }
        .favorite-heart-btn i {
            color: #ccc;
            font-size: 1rem;
        }
        .favorite-heart-btn.active i {
            color: #eb4d4b;
        }
        .product-info {
            padding: 15px 0;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .product-info h3 {
            font-size: 0.95rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .product-price {
            font-size: 0.95rem;
            font-weight: 500;
            color: #444;
        }

        /* DETAYLI ÜRÜN PENCERESİ (MODAL) */
        .modal {
            display: none; 
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.6);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal-content {
            background-color: white;
            width: 100%;
            max-width: 900px;
            position: relative;
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
        }
        @media (max-width: 768px) {
            .modal-content { grid-template-columns: 1fr; max-height: 90vh; overflow-y: auto; }
        }
        .close-modal {
            position: absolute;
            top: 15px; right: 20px;
            font-size: 1.5rem;
            cursor: pointer;
            z-index: 10;
        }
        .modal-media {
            padding: 30px;
            background-color: #fafafa;
            border-right: 1px solid #eee;
        }
        .modal-main-img {
            width: 100%; height: 320px; object-fit: cover; margin-bottom: 20px;
        }
        .video-box {
            background-color: #111; color: #fff; height: 100px;
            display: flex; align-items: center; justify-content: center;

            letter-spacing:
