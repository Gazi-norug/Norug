<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>NoRug | Håndlaget Tufting</title>
    <style>
        body, html { margin: 0; height: 100%; font-family: 'Helvetica Neue', sans-serif; }
        
        /* Arka plan: Tufting atölyesi havası için karartılmış görsel */
        .hero-bg {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1621351185034-5833989c4d29?q=80&w=2000');
            background-size: cover;
            background-position: center;
            color: white;
            text-align: center;
        }

        .logo { width: 300px; margin-bottom: 20px; }
        h1 { font-size: 2em; font-weight: 300; letter-spacing: 2px; }
        p { font-size: 1.1em; color: #dfe6e9; }
    </style>
</head>
<body>
    <div class="hero-bg">
        <img src="logo.png" alt="NoRug Logo" class="logo">
        <h1>Håndlaget tufting i Horten</h1>
        <p>Nettsiden vår er under konstruksjon. Vi gleder oss til å vise frem våre unike tepper.</p>
    </div>
</body>
</html>
